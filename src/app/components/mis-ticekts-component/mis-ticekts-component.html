<div class="container container-content">
  <div class="page-header-tickets">
    <h2 class="d-flex align-items-center gap-2">
      <i class="fa-solid fa-user-check text-primary"></i>
      Mis tickets asignados
    </h2>
    <p class="text-muted small">Consulta los casos bajo tu responsabilidad y gestiona sus soluciones.</p>
  </div>

  <div *ngIf="tickets.length > 0; else noTicket" class="d-flex flex-column gap-3">
    <div *ngFor="let t of tickets" class="card ticket-assigned-card shadow-sm">
      <div class="card-body p-4">
        </div>
    </div>
  </div>
</div>

<ng-template #noTicket>
  <div class="empty-state">
    <div class="empty-icon">
      <i class="fa-solid fa-inbox"></i>
    </div>
    <h4>Sin tickets asignados</h4>
    <p>
      ¡Buen trabajo! No tienes tareas pendientes bajo tu asignación directa en este momento.
    </p>
    <a class="btn btn-assign-courses" routerLink="/tickets">
      <i class="fa-solid fa-ticket me-2"></i>
      Ver todos los tickets
    </a>
  </div>
</ng-template>
