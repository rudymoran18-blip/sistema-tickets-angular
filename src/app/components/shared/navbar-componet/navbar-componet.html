<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm py-3">
  <div class="container-fluid px-4">
    <a class="navbar-brand fw-bold d-flex align-items-center gap-2" [routerLink]="['/home']" style="cursor: pointer;">
      <i class="bi bi-cpu-fill text-white fs-4"></i>
      <span>MiApp</span>
    </a>

    <button
      class="navbar-toggler border-0 shadow-none"
      type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent"
      aria-controls="navbarSupportedContent"
      aria-expanded="false"
      aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav me-auto mb-2 mb-lg-0 gap-1">
        <li class="nav-item">
          <a class="nav-link px-3 rounded-2 text-hover-bg" [routerLink]="['/home']" routerLinkActive="active">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 rounded-2 text-hover-bg" [routerLink]="['/tickets']" routerLinkActive="active">Tickets</a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 rounded-2 text-hover-bg d-flex align-items-center gap-2" [routerLink]="['/mis-tickets']" routerLinkActive="active">
            <span>Mis Tickets</span>
            <span *ngIf="cantidadTickets > 0" class="badge rounded-pill bg-danger shadow-sm px-2 py-1 header-badge">
              {{ cantidadTickets }}
            </span>
          </a>
        </li>
      </ul>

      <ul class="navbar-nav align-items-lg-center">
        <li class="nav-item dropdown">
          <a
            class="nav-link d-flex align-items-center justify-content-center position-relative p-2 rounded-circle bell-container text-hover-bg"
            role="button"
            data-bs-toggle="dropdown"
            aria-expanded="false"
            style="width: 40px; height: 40px;">
            <i class="bi bi-bell-fill fs-5"></i>
            <span
              *ngIf="cantidadTickets > 0"
              class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-2 border-primary bell-badge">
              {{ cantidadTickets }}
            </span>
          </a>

          <ul class="dropdown-menu dropdown-menu-end shadow-lg mt-2 border-0 rounded-3 overflow-hidden animate-fade-in" style="min-width: 320px;">
            <li>
              <div class="dropdown-header bg-light py-3 d-flex justify-content-between align-items-center border-b font-weight-bold text-dark">
                <span class="fw-bold fs-6">Mis Tickets Recientes</span>
                <span class="badge bg-primary-subtle text-primary rounded-pill px-2.5 py-1 fw-bold">{{ cantidadTickets }} en total</span>
              </div>
            </li>

            <ng-container *ngIf="misTickets.length > 0; else sinTickets">
              <li *ngFor="let t of misTickets.slice(0,3)">
                <a class="dropdown-item py-2.5 px-3 border-bottom-subtle transition-item">
                  <div class="d-flex justify-content-between align-items-start mb-1">
                    <span class="fw-bold text-dark text-sm">Ticket #{{ t.id }}</span>
                    <span
                      class="badge px-2 py-1 rounded-2 text-xs"
                      [ngClass]="{
                        'bg-danger-subtle text-danger': t.prioridad === 'Alta',
                        'bg-warning-subtle text-warning-dark': t.prioridad === 'Media',
                        'bg-success-subtle text-success': t.prioridad === 'Baja'
                      }">
                      {{ t.prioridad }}
                    </span>
                  </div>
                  <small class="text-muted d-block text-truncate style-desc" style="max-width: 270px;">
                    {{ t.titulo }}
                  </small>
                </a>
              </li>
            </ng-container>

            <ng-template #sinTickets>
              <li class="py-4 text-center">
                <i class="bi bi-envelope-open text-muted fs-3 d-block mb-2"></i>
                <span class="text-muted small">No tienes tickets asignados</span>
              </li>
            </ng-template>

            <li>
              <a class="dropdown-item text-center text-primary fw-bold py-2.5 text-sm bg-hover-light"
                 [routerLink]="['/mis-tickets']">
                Ver todos mis tickets <i class="bi bi-arrow-right ms-1"></i>
              </a>
            </li>
          </ul>
        </li>
      </ul>

    </div>
  </div>
</nav>
